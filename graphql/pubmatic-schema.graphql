# ─────────────────────────────────────────────
# Payload / Response Types
# ─────────────────────────────────────────────

type PublisherPayload {
  publisher: Publisher
  errors: [UserError!]!
}

type SitePayload {
  site: Site
  errors: [UserError!]!
}

type AdSlotPayload {
  adSlot: AdSlot
  errors: [UserError!]!
}

type DealPayload {
  deal: Deal
  errors: [UserError!]!
}

type PrivateMarketplacePayload {
  privateMarketplace: PrivateMarketplace
  errors: [UserError!]!
}

type AudienceSegmentPayload {
  audienceSegment: AudienceSegment
  errors: [UserError!]!
}

type CurationPackagePayload {
  curationPackage: CurationPackage
  errors: [UserError!]!
}

type YieldReportPayload {
  report: YieldReport
  errors: [UserError!]!
}

type OpenWrapConfigPayload {
  config: OpenWrapConfig
  errors: [UserError!]!
}

type ApiKeyPayload {
  apiKey: ApiKey
  keyValue: String
  errors: [UserError!]!
}

type DeletePayload {
  id: ID!
  success: Boolean!
  errors: [UserError!]!
}

type UserError {
  field: String
  message: String!
  code: String
}

# ─────────────────────────────────────────────
# Query Root
# ─────────────────────────────────────────────

type Query {
  # Publisher queries
  publisher(id: ID!): Publisher
  publishers(pagination: PaginationInput, status: PublisherStatus): PublisherConnection!

  # Site queries
  site(id: ID!): Site
  sites(publisherId: ID!, pagination: PaginationInput, status: AdSlotStatus): SiteConnection!

  # Ad slot queries
  adSlot(id: ID!): AdSlot
  adSlots(siteId: ID!, pagination: PaginationInput, status: AdSlotStatus, adFormat: AdFormat): AdSlotConnection!

  # Deal queries
  deal(id: ID!): Deal
  deals(
    publisherId: ID
    buyerId: ID
    dealType: DealType
    status: DealStatus
    pagination: PaginationInput
  ): DealConnection!

  # Private Marketplace queries
  privateMarketplace(id: ID!): PrivateMarketplace
  privateMarketplaces(publisherId: ID!, pagination: PaginationInput): [PrivateMarketplace!]!

  # Buyer queries
  buyer(id: ID!): Buyer
  buyers(pagination: PaginationInput, status: BuyerStatus): BuyerConnection!

  # Audience segment queries
  audienceSegment(id: ID!): AudienceSegment
  audienceSegments(
    publisherId: ID
    segmentType: AudienceSegmentType
    status: AudienceSegmentStatus
    pagination: PaginationInput
  ): AudienceSegmentConnection!

  # Curation package queries
  curationPackage(id: ID!): CurationPackage
  curationPackages(publisherId: ID!, status: CurationPackageStatus, pagination: PaginationInput): CurationPackageConnection!

  # Yield analytics queries
  yieldReport(id: ID!): YieldReport
  yieldSummary(publisherId: ID!, dateRange: DateRangeInput!, granularity: ReportGranularity!): YieldReport

  # Identity queries
  identityMappings(publisherId: ID!): [IdentityMapping!]!
  identityMapping(id: ID!): IdentityMapping

  # Supply path queries
  supplyPaths(publisherId: ID!): [SupplyPath!]!

  # OpenWrap queries
  openWrapConfig(siteId: ID!): OpenWrapConfig
  openWrapConfigs(publisherId: ID!): [OpenWrapConfig!]!

  # Alert queries
  alerts(publisherId: ID!, severity: AlertSeverity, unreadOnly: Boolean): [Alert!]!

  # API key queries
  apiKeys(publisherId: ID!): [ApiKey!]!
}

# ─────────────────────────────────────────────
# Mutation Root
# ─────────────────────────────────────────────

type Mutation {
  # Publisher mutations
  createPublisher(input: CreatePublisherInput!): PublisherPayload!
  updatePublisher(id: ID!, input: UpdatePublisherInput!): PublisherPayload!
  deletePublisher(id: ID!): DeletePayload!

  # Site mutations
  createSite(input: CreateSiteInput!): SitePayload!
  updateSite(id: ID!, input: UpdateSiteInput!): SitePayload!
  deleteSite(id: ID!): DeletePayload!

  # Ad slot mutations
  createAdSlot(input: CreateAdSlotInput!): AdSlotPayload!
  updateAdSlot(id: ID!, input: UpdateAdSlotInput!): AdSlotPayload!
  deleteAdSlot(id: ID!): DeletePayload!
  bulkUpdateAdSlotStatus(ids: [ID!]!, status: AdSlotStatus!): [AdSlotPayload!]!

  # Deal mutations
  createDeal(input: CreateDealInput!): DealPayload!
  updateDeal(id: ID!, input: UpdateDealInput!): DealPayload!
  deleteDeal(id: ID!): DeletePayload!
  activateDeal(id: ID!): DealPayload!
  pauseDeal(id: ID!): DealPayload!

  # Private Marketplace mutations
  createPrivateMarketplace(input: CreatePrivateMarketplaceInput!): PrivateMarketplacePayload!
  updatePrivateMarketplace(id: ID!, input: UpdatePrivateMarketplaceInput!): PrivateMarketplacePayload!
  deletePrivateMarketplace(id: ID!): DeletePayload!
  inviteBuyers(input: InviteBuyerInput!): PrivateMarketplacePayload!
  removeBuyerFromPrivateMarketplace(privateMarketplaceId: ID!, buyerId: ID!): PrivateMarketplacePayload!

  # Audience segment mutations
  createAudienceSegment(input: CreateAudienceSegmentInput!): AudienceSegmentPayload!
  updateAudienceSegment(id: ID!, input: UpdateAudienceSegmentInput!): AudienceSegmentPayload!
  deleteAudienceSegment(id: ID!): DeletePayload!

  # Curation package mutations
  createCurationPackage(input: CreateCurationPackageInput!): CurationPackagePayload!
  updateCurationPackage(id: ID!, input: UpdateCurationPackageInput!): CurationPackagePayload!
  deleteCurationPackage(id: ID!): DeletePayload!
  activateCurationPackage(id: ID!): CurationPackagePayload!

  # Yield report mutations
  generateYieldReport(input: YieldReportRequestInput!): YieldReportPayload!

  # Ad quality mutations
  updateAdQualitySettings(input: UpdateAdQualityInput!): PublisherPayload!

  # OpenWrap mutations
  updateOpenWrapConfig(input: UpdateOpenWrapConfigInput!): OpenWrapConfigPayload!

  # Alert mutations
  markAlertRead(id: ID!): Alert!
  markAllAlertsRead(publisherId: ID!): Boolean!

  # API key mutations
  createApiKey(input: CreateApiKeyInput!): ApiKeyPayload!
  revokeApiKey(id: ID!): DeletePayload!
}
