"""
PubMatic GraphQL Schema
Conceptual schema derived from PubMatic's supply-side platform (SSP) API surface,
covering inventory management, deals, private marketplaces, audience segments,
yield analytics, and programmatic direct workflows.
"""

# ─────────────────────────────────────────────
# Scalar Types
# ─────────────────────────────────────────────

scalar DateTime
scalar JSON
scalar URL
scalar BigInt

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum AdFormat {
  DISPLAY
  VIDEO
  NATIVE
  AUDIO
  CTV
  INTERSTITIAL
  REWARDED
  BANNER
  RICH_MEDIA
}

enum AdSlotStatus {
  ACTIVE
  INACTIVE
  PENDING
  ARCHIVED
  SUSPENDED
}

enum DealType {
  PREFERRED
  GUARANTEED
  PRIVATE_AUCTION
  OPEN_AUCTION
  PROGRAMMATIC_GUARANTEED
}

enum DealStatus {
  ACTIVE
  PAUSED
  PENDING
  EXPIRED
  REJECTED
  DRAFT
}

enum InventoryType {
  WEB
  APP
  CTV
  AUDIO
  DOOH
  AMP
}

enum PricingModel {
  CPM
  CPC
  CPV
  VCPM
  FLAT
}

enum AudienceSegmentStatus {
  ACTIVE
  INACTIVE
  BUILDING
  EXPIRED
}

enum AudienceSegmentType {
  FIRST_PARTY
  THIRD_PARTY
  CONTEXTUAL
  LOOKALIKE
  RETARGETING
  BEHAVIORAL
}

enum ReportGranularity {
  HOURLY
  DAILY
  WEEKLY
  MONTHLY
}

enum ReportDimension {
  SITE
  AD_SLOT
  DEAL
  BUYER
  COUNTRY
  DEVICE_TYPE
  AD_FORMAT
  AUDIENCE_SEGMENT
  SUPPLY_PATH
}

enum ReportMetric {
  IMPRESSIONS
  CLICKS
  REVENUE
  CPM
  FILL_RATE
  WIN_RATE
  BID_REQUESTS
  BID_RESPONSES
  VIEWABILITY
  COMPLETION_RATE
}

enum DeviceType {
  DESKTOP
  MOBILE
  TABLET
  CTV
  AUDIO_DEVICE
  DOOH_SCREEN
}

enum TargetingOperator {
  INCLUDE
  EXCLUDE
}

enum BuyerStatus {
  ACTIVE
  INACTIVE
  BLOCKED
  PENDING_APPROVAL
}

enum PublisherStatus {
  ACTIVE
  INACTIVE
  SUSPENDED
  PENDING
}

enum VideoProtocol {
  VAST_2_0
  VAST_3_0
  VAST_4_0
  VPAID_1_0
  VPAID_2_0
}

enum VideoPlacement {
  IN_STREAM
  IN_BANNER
  IN_ARTICLE
  IN_FEED
  INTERSTITIAL
}

enum AdQualityCategory {
  GAMBLING
  ADULT
  POLITICAL
  ALCOHOL
  PHARMA
  FIREARMS
  FINANCIAL
}

enum CurationPackageStatus {
  ACTIVE
  INACTIVE
  DRAFT
  PENDING_REVIEW
}

enum IdentityProvider {
  LIVERAMP
  UNIFIED_ID_2
  ID5
  FIRST_ID
  PUBMATIC_IDENTITY
  GOOGLE_ENCRYPTED
}

enum SupplyPathOptimizationStatus {
  ENABLED
  DISABLED
}

enum AlertSeverity {
  INFO
  WARNING
  CRITICAL
}

# ─────────────────────────────────────────────
# Core Resource Types
# ─────────────────────────────────────────────

type Publisher {
  id: ID!
  name: String!
  status: PublisherStatus!
  website: URL
  email: String
  country: String
  currency: String
  revenueShare: Float
  adQualitySettings: AdQualitySettings
  sites: [Site!]!
  deals: [Deal!]!
  audienceSegments: [AudienceSegment!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Site {
  id: ID!
  publisherId: ID!
  publisher: Publisher!
  name: String!
  domain: URL!
  inventoryType: InventoryType!
  status: AdSlotStatus!
  adSlots: [AdSlot!]!
  categories: [String!]!
  adsTxtStatus: AdsTxtStatus
  createdAt: DateTime!
  updatedAt: DateTime!
}

type AdSlot {
  id: ID!
  siteId: ID!
  site: Site!
  name: String!
  adFormats: [AdFormat!]!
  sizes: [AdSize!]!
  floorPrice: Float
  currency: String
  status: AdSlotStatus!
  inventoryType: InventoryType!
  videoSettings: VideoSettings
  nativeSettings: NativeSettings
  targeting: TargetingSettings
  createdAt: DateTime!
  updatedAt: DateTime!
}

type AdSize {
  width: Int!
  height: Int!
}

type VideoSettings {
  placement: VideoPlacement!
  protocols: [VideoProtocol!]!
  minDuration: Int
  maxDuration: Int
  mimes: [String!]!
  skipEnabled: Boolean
  skipOffset: Int
}

type NativeSettings {
  titleRequired: Boolean
  descriptionRequired: Boolean
  imageRequired: Boolean
  iconRequired: Boolean
  clickthroughRequired: Boolean
}

type Deal {
  id: ID!
  name: String!
  dealType: DealType!
  status: DealStatus!
  publisher: Publisher!
  buyers: [Buyer!]!
  floorPrice: Float!
  currency: String!
  pricingModel: PricingModel!
  startDate: DateTime!
  endDate: DateTime
  targeting: DealTargeting
  inventoryList: [AdSlot!]!
  audienceSegments: [AudienceSegment!]!
  impressionGoal: BigInt
  revenueGoal: Float
  pacingEnabled: Boolean
  createdAt: DateTime!
  updatedAt: DateTime!
}

type PrivateMarketplace {
  id: ID!
  name: String!
  description: String
  publisher: Publisher!
  deals: [Deal!]!
  status: DealStatus!
  buyerInvitations: [BuyerInvitation!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Buyer {
  id: ID!
  name: String!
  seatId: String!
  dspName: String
  status: BuyerStatus!
  deals: [Deal!]!
  blocklist: BlocklistSettings
  createdAt: DateTime!
  updatedAt: DateTime!
}

type BuyerInvitation {
  id: ID!
  buyerId: ID!
  buyer: Buyer!
  privateMarketplaceId: ID!
  status: String!
  invitedAt: DateTime!
  respondedAt: DateTime
}

type AudienceSegment {
  id: ID!
  name: String!
  description: String
  publisherId: ID!
  publisher: Publisher!
  segmentType: AudienceSegmentType!
  status: AudienceSegmentStatus!
  provider: String
  taxonomy: String
  userCount: BigInt
  cpm: Float
  currency: String
  expiresAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

type AdQualitySettings {
  blockedCategories: [AdQualityCategory!]!
  blockedAdvertiserDomains: [String!]!
  blockedAttributes: [Int!]!
  safeScanEnabled: Boolean
}

type AdsTxtStatus {
  valid: Boolean!
  lastChecked: DateTime
  missingEntries: [String!]!
  url: URL
}

type DealTargeting {
  geoTargeting: GeoTargeting
  deviceTargeting: DeviceTargeting
  audienceTargeting: AudienceTargeting
  contentTargeting: ContentTargeting
  daypartTargeting: DaypartTargeting
}

type TargetingSettings {
  geoTargeting: GeoTargeting
  deviceTargeting: DeviceTargeting
  audienceTargeting: AudienceTargeting
}

type GeoTargeting {
  operator: TargetingOperator!
  countries: [String!]!
  regions: [String!]!
  cities: [String!]!
  zipCodes: [String!]!
  dmas: [String!]!
}

type DeviceTargeting {
  operator: TargetingOperator!
  deviceTypes: [DeviceType!]!
  operatingSystems: [String!]!
  browsers: [String!]!
}

type AudienceTargeting {
  operator: TargetingOperator!
  segmentIds: [ID!]!
}

type ContentTargeting {
  operator: TargetingOperator!
  categories: [String!]!
  keywords: [String!]!
}

type DaypartTargeting {
  timezone: String!
  dayparts: [Daypart!]!
}

type Daypart {
  dayOfWeek: Int!
  startHour: Int!
  endHour: Int!
}

type BlocklistSettings {
  domains: [String!]!
  apps: [String!]!
  categories: [AdQualityCategory!]!
}

type YieldReport {
  id: ID!
  publisherId: ID!
  granularity: ReportGranularity!
  startDate: DateTime!
  endDate: DateTime!
  dimensions: [ReportDimension!]!
  metrics: [ReportMetric!]!
  rows: [YieldReportRow!]!
  generatedAt: DateTime!
}

type YieldReportRow {
  dimensions: JSON!
  impressions: BigInt
  clicks: BigInt
  revenue: Float
  cpm: Float
  fillRate: Float
  winRate: Float
  bidRequests: BigInt
  bidResponses: BigInt
  viewability: Float
  completionRate: Float
}

type CurationPackage {
  id: ID!
  name: String!
  description: String
  status: CurationPackageStatus!
  publisher: Publisher!
  buyers: [Buyer!]!
  inventoryList: [AdSlot!]!
  audienceSegments: [AudienceSegment!]!
  floorPrice: Float
  currency: String
  dealType: DealType!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type IdentityMapping {
  id: ID!
  publisherId: ID!
  provider: IdentityProvider!
  enabled: Boolean!
  signalContribution: Float
  resolvedUsers: BigInt
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SupplyPath {
  id: ID!
  publisherId: ID!
  sellerId: String!
  sellerType: String!
  domain: String
  status: SupplyPathOptimizationStatus!
  isDirectPath: Boolean!
  hops: Int!
}

type OpenWrapConfig {
  id: ID!
  siteId: ID!
  site: Site!
  version: String!
  adUnit: String!
  bidders: [OpenWrapBidder!]!
  timeout: Int
  enabledFormats: [AdFormat!]!
  updatedAt: DateTime!
}

type OpenWrapBidder {
  name: String!
  enabled: Boolean!
  params: JSON
  floorPrice: Float
}

type Alert {
  id: ID!
  publisherId: ID!
  severity: AlertSeverity!
  title: String!
  message: String!
  isRead: Boolean!
  createdAt: DateTime!
}

type ApiKey {
  id: ID!
  publisherId: ID!
  name: String!
  keyPreview: String!
  scopes: [String!]!
  expiresAt: DateTime
  createdAt: DateTime!
}

# ─────────────────────────────────────────────
# Pagination / Connection Types
# ─────────────────────────────────────────────

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
  totalCount: Int!
}

type PublisherConnection {
  edges: [PublisherEdge!]!
  pageInfo: PageInfo!
}

type PublisherEdge {
  cursor: String!
  node: Publisher!
}

type SiteConnection {
  edges: [SiteEdge!]!
  pageInfo: PageInfo!
}

type SiteEdge {
  cursor: String!
  node: Site!
}

type AdSlotConnection {
  edges: [AdSlotEdge!]!
  pageInfo: PageInfo!
}

type AdSlotEdge {
  cursor: String!
  node: AdSlot!
}

type DealConnection {
  edges: [DealEdge!]!
  pageInfo: PageInfo!
}

type DealEdge {
  cursor: String!
  node: Deal!
}

type AudienceSegmentConnection {
  edges: [AudienceSegmentEdge!]!
  pageInfo: PageInfo!
}

type AudienceSegmentEdge {
  cursor: String!
  node: AudienceSegment!
}

type BuyerConnection {
  edges: [BuyerEdge!]!
  pageInfo: PageInfo!
}

type BuyerEdge {
  cursor: String!
  node: Buyer!
}

type CurationPackageConnection {
  edges: [CurationPackageEdge!]!
  pageInfo: PageInfo!
}

type CurationPackageEdge {
  cursor: String!
  node: CurationPackage!
}

