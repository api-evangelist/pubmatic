aid: pubmatic
name: PubMatic
description: 'PubMatic is a Redwood City, California-headquartered independent technology
  company (NASDAQ: PUBM) operating a supply-side platform (SSP) that powers programmatic
  advertising for publishers, media buyers, commerce media, and AI agents across CTV,
  mobile app, online video, display, and audio. Its unified platform combines an SSP
  for monetization and demand access, the OpenWrap header-bidding wrapper (an open-source
  Prebid-based wrapper with web, iOS, Android, Flutter, and Unity SDKs), Connect for
  curation and audience activation, Activate for buyer-side supply-path optimization
  and direct-to-publisher deals, Convert for commerce/retail media, Identity Hub for
  identity orchestration, and AgenticOS for agent-driven campaign planning and execution.
  PubMatic processes trillions of bids per day across global infrastructure, and exposes
  its programmatic surface primarily via the OpenRTB protocol, prebid integrations,
  and embedded SDKs rather than a public REST developer portal — making this profile
  a directory of PubMatic''s products, OpenWrap repos, sample apps, and supply-chain
  endpoints rather than a tier-1 OpenAPI-backed catalog.'
